spring.application.name=employee-management-system
spring.datasource.url=jdbc:mysql://localhost:3306/employee_management_db
spring.datasource.username=root
spring.datasource.password=Babamamanani25@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Hibernate JPA setting
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.main.allow-circular-references=true
# JMS
spring.activemq.broker-url=tcp://localhost:61616
spring.activemq.user=admin
spring.activemq.password=admin
logging.level.org.springframework.oxm=DEBUG
logging.level.org.springframework.context.support=DEBUG

spring.activemq.packages.trust-all=true
spring.activemq.packages.trusted=com.example.employeemanagement.entity
